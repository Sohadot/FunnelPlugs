<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" class="fp-sovereign-logo">
  <path d="M10 50H90M50 10V90" stroke="#1a1f26" stroke-width="0.5" />
  <circle cx="50" cy="50" r="38" stroke="#1a1f26" stroke-width="0.5" stroke-dasharray="2 2" />

  <rect x="15" y="15" width="70" height="70" rx="2" stroke="#00ff41" stroke-width="1.5" class="frame-pulse" />

  <g class="plug-core">
    <rect x="38" y="38" width="24" height="24" fill="#00ff41" fill-opacity="0.15" stroke="#00ff41" stroke-width="2">
      <animate attributeName="fill-opacity" values="0.10;0.35;0.10" dur="3s" repeatCount="indefinite" />
    </rect>
    <path d="M50 15V38M50 62V85M15 50H38M62 50H85" stroke="#00ff41" stroke-width="1" stroke-dasharray="4 2" />
  </g>

  <path d="M15 25V15H25M75 15H85V25M85 75V85H75M25 85H15V75" stroke="#00ff41" stroke-width="3" />

  <style>
    .frame-pulse {
      animation: border-glow 4s ease-in-out infinite;
    }

    @keyframes border-glow {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 1; }
    }

    .fp-sovereign-logo {
      filter: drop-shadow(0 0 2px rgba(0, 255, 65, 0.35));
    }
  </style>
</svg>
