name: Governance Integrity

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  governance:
    name: Governance, Security, and Markdown Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Markdown style lint
        uses: DavidAnson/markdownlint-cli2-action@6b51ade7a9e4a75a7ad929842dd298a3804ebe8b # v23.1.0
        with:
          globs: |
            **/*.md

      - name: Governance guard
        run: python scripts/governance_guard.py --base-ref origin/main

      - name: Markdown relative link integrity
        run: python scripts/check_markdown_links.py

      - name: Sovereign strict standards guard
        run: python scripts/sovereign_standards_guard.py
