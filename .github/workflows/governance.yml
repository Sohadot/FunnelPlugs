name: Governance Integrity

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  governance:
    name: Governance, Security, and Markdown Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Markdown style lint
        uses: DavidAnson/markdownlint-cli2-action@992badcdf24e3b8eb7e87ff9287fe931bcb00c6e # v20.0.0
        with:
          globs: |
            **/*.md

      - name: Governance guard
        run: python scripts/governance_guard.py --base-ref origin/main

      - name: Markdown relative link integrity
        run: python scripts/check_markdown_links.py

      - name: Sovereign strict standards guard
        run: python scripts/sovereign_standards_guard.py
