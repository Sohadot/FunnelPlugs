name: Sovereign Pages Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Sovereign Asset
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: Markdown style lint
        uses: DavidAnson/markdownlint-cli2-action@992badcdf24e3b8eb7e87ff9287fe931bcb00c6e # v20.0.0
        with:
          globs: |
            **/*.md

      - name: Governance guard
        run: python scripts/governance_guard.py --base-ref origin/main

      - name: Markdown relative link integrity
        run: python scripts/check_markdown_links.py

      - name: Sovereign strict standards guard
        run: python scripts/sovereign_standards_guard.py

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install Jinja2

      - name: Run sovereign quality gate (generate, validate, sitemap)
        run: python scripts/quality_gate.py

      - name: Stage public Pages artifact
        shell: bash
        run: |
          set -Eeuo pipefail

          rm -rf .pages-dist
          mkdir -p .pages-dist

          shopt -s nullglob

          for f in *.html robots.txt sitemap.xml favicon.ico; do
            if [ -e "$f" ]; then
              cp -R "$f" .pages-dist/
            fi
          done

          for d in assets registry standard reports glossary leaks plugs; do
            if [ -d "$d" ]; then
              mkdir -p ".pages-dist/$d"
              cp -R "$d"/. ".pages-dist/$d"/
            fi
          done

          test -f .pages-dist/index.html
          test -f .pages-dist/sitemap.xml
          test -f .pages-dist/404.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: .pages-dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
