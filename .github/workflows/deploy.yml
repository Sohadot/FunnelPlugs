name: Sovereign Pages Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Sovereign Asset
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Markdown style lint
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          globs: |
            **/*.md

      - name: Governance guard
        run: python scripts/governance_guard.py --base-ref origin/main

      - name: Markdown relative link integrity
        run: python scripts/check_markdown_links.py

      - name: Sovereign strict standards guard
        run: python scripts/sovereign_standards_guard.py

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install Jinja2

      - name: Run sovereign quality gate (generate, validate, sitemap)
        run: python scripts/quality_gate.py

      - name: Stage public Pages artifact
        shell: bash
        run: |
          set -Eeuo pipefail

          rm -rf .pages-dist
          mkdir -p .pages-dist

          shopt -s nullglob

          for f in *.html robots.txt sitemap.xml favicon.ico; do
            if [ -e "$f" ]; then
              cp -R "$f" .pages-dist/
            fi
          done

          for d in assets registry standard reports glossary leaks plugs; do
            if [ -d "$d" ]; then
              mkdir -p ".pages-dist/$d"
              cp -R "$d"/. ".pages-dist/$d"/
            fi
          done

          test -f .pages-dist/index.html
          test -f .pages-dist/sitemap.xml
          test -f .pages-dist/404.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: .pages-dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
