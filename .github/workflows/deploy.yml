name: Sovereign Pages Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Sovereign Asset
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install Jinja2

      - name: Validate sovereign governance baseline
        run: python scripts/sovereign_standards_guard.py

      - name: Run sovereign build and quality gate
        run: python scripts/build.py

      - name: Stage public Pages artifact
        shell: bash
        run: |
          set -Eeuo pipefail

          rm -rf .pages-dist
          mkdir -p .pages-dist

          shopt -s nullglob

          for f in *.html robots.txt sitemap.xml favicon.ico; do
            if [ -e "$f" ]; then
              cp -R "$f" .pages-dist/
            fi
          done

          for d in assets registry standard reports glossary leaks plugs; do
            if [ -d "$d" ]; then
              mkdir -p ".pages-dist/$d"
              cp -R "$d"/. ".pages-dist/$d"/
            fi
          done

          test -f .pages-dist/index.html
          test -f .pages-dist/sitemap.xml

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .pages-dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
