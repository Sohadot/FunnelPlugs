<!DOCTYPE html>
<html lang="{{ site.language }}" dir="{{ site.direction }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title or site.title_default }}</title>
    
    <meta name="description" content="{{ page.description or site.description_default }}">
    <meta name="robots" content="{{ seo.robots_default }}">
    <link rel="canonical" href="{{ page.canonical or site.canonical_url }}">
    
    <link rel="stylesheet" href="/assets/css/main.css">
    
    <meta property="og:site_name" content="{{ site.name }}">
    <meta property="og:title" content="{{ page.title }}">
    <meta property="og:url" content="{{ page.canonical }}">
    <meta property="og:image" content="{{ seo.default_og_image }}">
    <meta name="twitter:card" content="summary_large_image">

    <style>
        :root {
            --ui-accent: #00ff41; /* Matrix/Control Green */
            --ui-bg: #05070a;
            --ui-border: #1a1f26;
            --ui-text: #d1d5db;
        }
    </style>
</head>
<body class="sovereign-shell status-online">

    <header class="control-header">
        <div class="header-grid">
            <div class="brand-unit">
                <a href="/" class="logo-link">
                    <span class="prefix">FP</span><span class="domain-dot">.</span><span class="suffix">COM</span>
                </a>
                <span class="status-indicator"></span>
            </div>
            
            <nav class="system-nav">
                <ul class="nav-links">
                    {% for item in navigation.header %}
                    <li>
                        <a href="{{ item.href }}" class="nav-item {% if page.key == item.key %}active{% endif %}">
                            {{ item.label | upper }}
                        </a>
                    </li>
                    {% endfor %}
                </ul>
            </nav>

            <div class="system-meta">
                <span class="system-clock" id="live-clock">00:00:00 UTC</span>
                <span class="version-tag">V.{{ site.version or "0.1.0" }}</span>
            </div>
        </div>
    </header>

    <main id="main-view" class="viewport">
        
        <div class="path-monitor">
            <span class="path-root">ROOT</span>
            <span class="path-separator">/</span>
            <span class="current-path">{{ (page.key or "INDEX") | upper }}</span>
        </div>

        <article class="data-container">
            {% block content %}
            {% endblock %}
        </article>

    </main>

    <footer class="system-footer">
        <div class="footer-grid">
            <div class="legal-clearance">
                <p>&copy; 2026 FUNNELPLUGS. <span class="security-clearance">SOVEREIGN-GRADE ASSET</span></p>
            </div>
            <div class="footer-status">
                <span class="label">STATUS:</span>
                <span class="value">STABLE_DEPLOIMENT</span>
            </div>
        </div>
    </footer>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toISOString().substr(11, 8) + ' UTC';
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
